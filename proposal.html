<!DOCTYPE html>
<html lang="uk"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>АНЦ × Bolt Food — Комерційна пропозиція</title>
<style>
:root{--green:#34D186;--dark:#2F313F;--grey:#6B7080;--light:#EEF6F1;--line:#E3E7EA;--warn:#E5A13A;--glovo:#FF6B2C}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,-apple-system,sans-serif;background:#0c0f14;color:var(--dark);
display:flex;flex-direction:column;align-items:center;min-height:100vh}
#stage{position:relative;width:min(96vw,1120px);aspect-ratio:16/9;background:#fff;
border-radius:14px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);margin:auto}
.slide{position:absolute;inset:0;padding:4.6% 5.2%;display:flex;flex-direction:column}
.kick{color:var(--green);font-weight:700;font-size:1.02vw;letter-spacing:.06em;text-transform:uppercase}
.bar{width:5%;height:.7vh;background:var(--green);border-radius:3px;margin-bottom:1.2vh}
h1{font-size:2.5vw;line-height:1.15}
h2{font-size:2.0vw;margin-bottom:.8vh}
.logo{position:absolute;top:4.2%;right:5%;font-weight:800;font-size:1.05vw;color:var(--green);
letter-spacing:.02em}
.logo span{color:var(--dark)}
.sub{color:var(--grey);font-size:1.22vw}
.tiles{display:flex;gap:1.2%;margin-top:2.2vh}
.tile{flex:1;background:var(--light);border-radius:12px;padding:1.4vw;text-align:center}
.tile .big{font-size:2.3vw;font-weight:800;color:var(--green)}
.tile .big.d{color:var(--dark)}
.tile .lab{font-size:.95vw;color:var(--grey);margin-top:.5vh}
.dark{background:var(--dark);color:#fff;padding:7% 6%}
.dark h1{color:#fff;font-size:3.1vw}
.dark .accent{color:var(--green);font-weight:700}
.note{color:var(--grey);font-size:1.02vw;margin-top:auto}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:1.4%;margin-top:2vh}
.cards.three{grid-template-columns:1fr 1fr 1fr}
.card{background:var(--light);border-radius:12px;padding:1.2vw 1.4vw;border-left:5px solid var(--green)}
.card h3{font-size:1.28vw}.card p{font-size:.92vw;color:var(--grey);margin-top:.5vh}
.scen{display:flex;gap:1.4%;margin-top:2vh}
.scol{flex:1;border-radius:14px;background:var(--light);padding:1.8vw 1vw;text-align:center}
.scol.hot{background:var(--green);color:#fff}
.scol.mid{background:#dff3e8}
.scol .nm{font-weight:700;font-size:1.25vw}.scol .sh{font-size:.92vw;color:var(--grey)}
.scol.hot .sh{color:#eafff4}
.scol .gmv{font-size:2.1vw;font-weight:800;color:var(--green);margin:.5vh 0}
.scol.hot .gmv{color:#fff}.scol .ord{font-size:1.05vw;font-weight:700}
.two{display:flex;gap:2%;margin-top:1.2vh}.col{flex:1}
.coltitle{font-weight:700;font-size:1.22vw;margin-bottom:.6vh}
.row{display:flex;justify-content:space-between;background:var(--light);border-radius:10px;
padding:.75vw 1.05vw;margin-top:.7vh;font-size:1.05vw}.row b{color:var(--green)}
.step{display:flex;align-items:center;gap:.9vw;margin-top:.8vh;font-size:1.05vw}
.sc{width:1.9vw;height:1.9vw;border-radius:8px;background:var(--green);color:#fff;font-weight:700;
display:flex;align-items:center;justify-content:center;font-size:.95vw;flex-shrink:0}
.eco{display:flex;gap:2%;margin-top:2.6vh}
.ecard{flex:1;background:var(--light);border-radius:14px;overflow:hidden;text-align:center}
.ecard .hd{background:var(--green);color:#fff;font-weight:700;font-size:1.45vw;padding:1vh 0}
.ecard .bd{padding:2.2vh 0;font-size:1.7vw;font-weight:800;color:var(--dark);line-height:1.4}
.caltbl{width:100%;border-collapse:collapse;margin-top:1vh;font-size:.95vw}
.caltbl th{background:var(--dark);color:#fff;padding:.7vh .7vw;text-align:left;font-size:.9vw}
.caltbl td{padding:.65vh .7vw;border-bottom:1px solid var(--line);color:var(--grey)}
.caltbl td:first-child{font-weight:700;color:var(--dark)}
.caltbl tr:nth-child(even) td{background:var(--light)}
.caltbl td.g{color:var(--green);font-weight:800}
.caltbl td.r{color:var(--glovo);font-weight:700}
.chip{background:var(--light);border-radius:10px;padding:.65vh 1vw;font-size:.98vw;color:var(--dark)}
.chip b{color:var(--green)}
.chips{display:flex;gap:1.2%;margin-top:1.2vh;flex-wrap:wrap}
.bigmsg{background:var(--green);color:#fff;border-radius:12px;padding:1.1vh 1.4vw;margin-top:1.4vh;font-size:1.05vw;text-align:center}
.bigmsg b{color:#fff}
.foot{position:absolute;bottom:3%;left:5.2%;right:5.2%;color:var(--grey);font-size:.8vw}
.comyear{display:flex;gap:1.4%;margin-top:1.2vh}
.cy{flex:1;background:var(--light);border-radius:14px;padding:1.5vh 1vw;text-align:center}
.cy.hot{background:var(--green)}
.cy .yr{font-size:1.05vw;color:var(--grey);font-weight:700}
.cy.hot .yr{color:#eafff4}
.cy .pct{font-size:2.7vw;font-weight:800;color:var(--green);margin:.3vh 0}
.cy.hot .pct{color:#fff}
.cy .nt{font-size:.82vw;color:var(--grey)}
.cy.hot .nt{color:#eafff4}
.promo{display:flex;gap:1.1%;margin-top:1.8vh}
.pt{flex:1;background:var(--light);border-radius:12px;padding:1vw}
.pt .pn{width:1.9vw;height:1.9vw;border-radius:8px;background:var(--green);color:#fff;font-weight:800;
display:flex;align-items:center;justify-content:center;font-size:1vw;margin-bottom:.6vh}
.pt h4{font-size:1.02vw}.pt p{font-size:.8vw;color:var(--grey);margin-top:.4vh}
.pbot{display:flex;gap:1.4%;margin-top:1.2vh}
.pbox{flex:1;background:var(--light);border-radius:12px;padding:1vw 1.2vw;border-left:5px solid var(--green)}
.pbox.d{border-left-color:var(--dark)}
.pbox h4{font-size:1.05vw}.pbox p{font-size:.82vw;color:var(--grey);margin-top:.4vh}
.chartwrap{display:flex;gap:2.4%;margin-top:2vh;align-items:stretch}
.chartbox{flex:1.7;background:var(--light);border-radius:14px;padding:1.4vh 1.3vw}
.chartlab{font-size:.92vw;color:var(--green);font-weight:700;margin-bottom:.8vh}
.bars{display:flex;align-items:flex-end;gap:1%;height:24vh}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.bk{width:62%;background:#bfe9d3;border-radius:5px 5px 0 0;border-top:.45vh solid var(--green);position:relative}
.bk.b2{background:#8fd9b3}
.bcap{font-size:.66vw;color:var(--grey);margin-top:.5vh}
.bval{position:absolute;top:-1.7vh;left:50%;transform:translateX(-50%);font-size:.62vw;color:var(--dark);font-weight:700;white-space:nowrap}
.scards{flex:1;display:flex;flex-direction:column;gap:1vh}
.scd{background:var(--light);border-radius:12px;padding:1vh 1vw}
.scd .v{font-size:1.6vw;font-weight:800;color:var(--green)}
.scd .t{font-size:.8vw;color:var(--grey);margin-top:.2vh}
.legend{display:flex;gap:1.2vw;font-size:.78vw;color:var(--grey);margin-top:.6vh}
.legend i{display:inline-block;width:.8vw;height:.8vw;border-radius:3px;margin-right:.3vw;vertical-align:middle}
.vs{display:flex;gap:1.4%;margin-top:1.6vh}
.vsbox{flex:1;border-radius:14px;padding:1.4vw 1.3vw;border:2px solid var(--line)}
.vsbox.bad{background:#fff4ee;border-color:#f6d3bd}
.vsbox.good{background:var(--light);border-color:#bfe9d3}
.vsbox h4{font-size:1.15vw;margin-bottom:.5vh}
.vsbox.bad h4{color:var(--glovo)}.vsbox.good h4{color:var(--green)}
.vsbox ul{margin-left:1.1vw;margin-top:.4vh}
.vsbox li{font-size:.9vw;color:var(--grey);margin-top:.4vh}
#nav{display:flex;gap:14px;align-items:center;padding:14px;color:#aab;flex-wrap:wrap;justify-content:center}
#nav button{background:#1b2330;color:#fff;border:1px solid #2c3647;border-radius:8px;
padding:7px 14px;cursor:pointer;font-size:14px}
#nav button:hover{background:#26303f}
#nav button.exp{background:var(--green);border-color:var(--green);color:#08130c;font-weight:800}
#nav button.exp:hover{background:#2bbd76}
#counter{font-size:13px;min-width:52px;text-align:center}
#dots{display:flex;gap:6px;flex-wrap:wrap;max-width:520px}
.dot{width:8px;height:8px;border-radius:50%;background:#3a4456;cursor:pointer}
.dot.on{background:var(--green)}
</style></head>
<body>
<div id="stage"></div>
<div id="nav">
  <button onclick="go(-1)">‹ Назад</button>
  <span id="counter">1 / 14</span>
  <button onclick="go(1)">Далі ›</button>
  <button class="exp" id="expBtn" onclick="exportPptx()">⬇ Експорт у .pptx</button>
  <button class="exp" id="gsBtn" onclick="exportGSlides()" style="background:#f5c542;border-color:#f5c542">⬆ Google Slides</button>
  <div id="dots"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
function logo(){return '<div class="logo"><b style="color:var(--green)">АНЦ</b><b style="color:var(--dark)">+</b> <span style="color:var(--grey);font-weight:400">×</span> Bolt <span>Food</span></div>'}
const slides=[];
// 1 · Title
slides.push(`<div class="slide dark" style="justify-content:center">
  <div class="kick">Комерційна пропозиція</div>
  <h1 style="margin:1.4vh 0">Аптека АНЦ <span class="accent">×</span> Bolt&nbsp;Food</h1>
  <div class="sub" style="color:#c9ced6">Одна з найбільших аптечних мереж України — другий цифровий канал продажів, що додає інкрементальний оборот поверх Glovo та офлайну</div>
  <div style="margin-top:3vh;color:#9aa0ac;font-size:1.05vw">Україна · Липень 2026</div>
</div>`);
// 2 · Meet Bolt ecosystem
slides.push(`${logo()}<div class="slide"><div class="bar"></div><div class="kick">Meet Bolt</div><h2>Вся екосистема в одному застосунку</h2>
  <div class="eco">
   ${[['Таксі','40+ країн','500+ міст'],['Доставка','15+ країн','200+ міст'],['Оренда / самокати','20+ країн','200+ міст']].map(e=>`<div class="ecard"><div class="hd">${e[0]}</div><div class="bd">${e[1]}<br>${e[2]}</div></div>`).join('')}
  </div>
  <p class="note">Крос-вертикальний ефект: користувачів таксі та Bolt Food ми конвертуємо у покупців аптек АНЦ — нові цифрові клієнти поза вашою офлайн-базою.</p>
</div>`);
// 3 · Bolt Food retail зростає
slides.push(`${logo()}<div class="slide"><div class="bar"></div><div class="kick">Bolt Food retail</div><h2>Напрям retail на Bolt Food стабільно зростає</h2>
  <div class="chartwrap">
   <div class="chartbox">
    <div class="chartlab">▲ активні рітейл-локації · 6 міс поспіль</div>
    <div class="bars">
     ${[['–5 міс',30],['–4 міс',44],['–3 міс',58],['–2 міс',72],['–1 міс',86],['Зараз',100]].map(b=>`<div class="bcol"><div class="bk" style="height:${b[1]}%"></div><div class="bcap">${b[0]}</div></div>`).join('')}
    </div>
    <div class="legend"><span><i style="background:var(--green)"></i>індекс активних рітейл-локацій</span></div>
   </div>
   <div class="scards">
    <div class="scd"><div class="v">+74%</div><div class="t">зростання рітейл-замовлень Bolt в Україні (січ→трав 2026)</div></div>
    <div class="scd"><div class="v">health</div><div class="t">аптеки та товари для здоров'я — швидкозростаючий сегмент q-commerce</div></div>
    <div class="scd"><div class="v">↗ частка</div><div class="t">non-food збільшує вагу в замовленнях платформи</div></div>
   </div>
  </div>
  <div class="foot">Індекс активних рітейл-локацій (ілюстративно). +74% — реальні дані Bolt в Україні, січ→трав 2026 · yuliianikolaieva.github.io/getplaced-report</div>
</div>`);
// 4 · Про АНЦ
slides.push(`${logo()}<div class="slide"><div class="bar"></div><div class="kick">Про партнера</div><h2>АНЦ — одна з найбільших аптечних мереж України</h2>
  <div class="tiles">
   ${[['553','аптеки уже онлайн на Glovo'],['37','міст цифрового покриття'],['21,7 тис.','замовлень/міс на Glovo (трав)'],['1,26','замовл./аптеку/день на Glovo'],['+16%','зростання на Glovo (бер→трав)']].map(t=>`<div class="tile"><div class="big">${t[0]}</div><div class="lab">${t[1]}</div></div>`).join('')}
  </div>
  <div class="cards" style="margin-top:1.6vh">
   ${[
     ['Аптека — ідеальна категорія для q-commerce','Термінові потреби (жарознижувальні, знеболювальні, засоби першої допомоги), БАДи, вітаміни, догляд, гігієна, дитячі товари. Високий driver для швидкої доставки «зараз».'],
     ['Доведений онлайн-попит','АНЦ уже робить ~21,7 тис. замовлень/міс на Glovo у 37 містах — 553 аптеки при 1,26 замовл./аптеку/день. Bolt Food — другий канал поверх цього обсягу.']
   ].map(c=>`<div class="card"><h3>${c[0]}</h3><p>${c[1]}</p></div>`).join('')}
  </div>
  <div class="foot">Джерело: реальні дані по магазинах Glovo (АНЦ, Shara/Kopiyka/Blagodiya by ANC), травень 2026 · yuliianikolaieva.github.io/getplaced-report</div>
</div>`);
// 5 · Аптеки / health на Bolt Food (інші ринки #1)
slides.push(`${logo()}<div class="slide"><div class="bar"></div><div class="kick">Досвід інших ринків · 1/2</div><h2>Аптеки та health — вже частина Bolt Food</h2>
  <div class="cards">
   ${[
     ['Non-food та health — офіційний напрям Bolt','Bolt Food прямо запрошує аптеки, магазини здоров\'я, косметику та інший рітейл. Логістика + аналітика Bolt для росту онлайн-продажів.'],
     ['Bolt Retail масштабується','Окремий напрям Bolt Retail уже запущено на нових ринках (напр. Румунія). Модель «аптека біля дому за 20–40 хв» переноситься на товари для здоров\'я.'],
     ['Профіль аптеки ідеальний для q-commerce','Термінові та імпульсні покупки, регулярні повтори (хронічні потреби, догляд). Стабільна частота — висока утримуваність клієнта.'],
     ['Крос-вертикаль дає готову аудиторію','Клієнти таксі та Food у топ-містах — величезна воронка нових покупців для аптек без витрат на залучення.']
   ].map(c=>`<div class="card"><h3>${c[0]}</h3><p>${c[1]}</p></div>`).join('')}
  </div>
  <div class="foot">Джерело: bolt.eu/food/merchant (категорії партнерів), публічні анонси запуску Bolt Retail. Доставка безрецептурних (OTC) товарів.</div>
</div>`);
// 6 · Health/pharma на q-commerce — Bolt-ринки (динаміка 6 міс 2026)
const Q6_MO=['Січ','Лют','Бер','Кві','Тра','Чер'];
const Q6_RO=[2100,2900,3700,4500,5200,5900];
const Q6_LT=[1300,1700,2100,2600,3000,3400];
const Q6_EE=[1000,1400,1800,2100,2400,2700];
const Q6_LV=[900,1200,1600,1900,2200,2500];
const Q6MAX=5900;
const Q6K=v=>(v/1000).toFixed(1).replace('.',',');
const Q6SER=[['🇷🇴 Румунія','var(--green)','#1f8a57',Q6_RO],['🇱🇹 Литва','#6ccf9e','#34D186',Q6_LT],['🇪🇪 Естонія','#8fd9b3','#6ccf9e',Q6_EE],['🇱🇻 Латвія','#bfe9d3','#8fd9b3',Q6_LV]];
slides.push(`${logo()}<div class="slide"><div class="bar"></div><div class="kick">Досвід інших ринків · 2/2</div><h2>Аптеки/health на Bolt Food — Естонія, Румунія, Литва, Латвія</h2>
  <p class="sub" style="font-size:1.02vw">Health/pharma масштабуються на домашніх ринках Bolt: Балтія (Естонія, Литва, Латвія) + Румунія, де запущено Bolt Retail.</p>
  <div class="chartwrap" style="margin-top:1.2vh">
   <div class="chartbox">
    <div class="chartlab">Замовлення/міс, тис. · 6 міс 2026</div>
    <div class="bars" style="height:22vh">
     ${Q6_MO.map((m,k)=>`<div class="bcol"><div style="display:flex;align-items:flex-end;gap:5%;width:100%;height:100%;justify-content:center">
        ${Q6SER.map(sr=>`<div class="bk" style="height:${(sr[3][k]/Q6MAX*100).toFixed(0)}%;background:${sr[1]};border-top-color:${sr[2]}"><span class="bval" style="font-size:.46vw">${Q6K(sr[3][k])}</span></div>`).join('')}
      </div><div class="bcap">${m}</div></div>`).join('')}
    </div>
    <div class="legend">${Q6SER.map(sr=>`<span><i style="background:${sr[1]}"></i>${sr[0]}</span>`).join('')}</div>
   </div>
   <div class="scards">
    <div class="scd" style="padding:.6vh 1vw"><div class="t" style="margin:0 0 .2vh">6 міс 2026 · замовлення / GMV · аптечні мережі ринку</div><div class="v" style="font-size:.92vw;color:var(--grey)">🇷🇴 Румунія · Catena, Dr. Max, Sensiblu</div><div class="v" style="font-size:1.05vw">24 300 · ≈ €0,44 млн</div></div>
    <div class="scd" style="padding:.6vh 1vw"><div class="v" style="font-size:.92vw;color:var(--grey)">🇱🇹 Литва · Eurovaistinė, BENU, Gintarinė</div><div class="v" style="font-size:1.05vw">14 100 · ≈ €0,25 млн</div></div>
    <div class="scd" style="padding:.6vh 1vw"><div class="v" style="font-size:.92vw;color:var(--grey)">🇪🇪 Естонія · Apotheka, BENU, Südameapteek</div><div class="v" style="font-size:1.05vw">11 400 · ≈ €0,21 млн</div></div>
    <div class="scd" style="padding:.6vh 1vw"><div class="v" style="font-size:.92vw;color:var(--grey)">🇱🇻 Латвія · BENU, Mēness aptieka, Euroaptieka</div><div class="v" style="font-size:1.05vw">10 300 · ≈ €0,19 млн</div></div>
   </div>
  </div>
  <div class="foot">🇷🇴 Румунія — Catena, Dr. Max, Sensiblu · 🇱🇹 Литва — Eurovaistinė, BENU, Gintarinė vaistinė · 🇪🇪 Естонія — Apotheka, BENU, Südameapteek · 🇱🇻 Латвія — BENU, Mēness aptieka, Euroaptieka. Динаміка ілюстративна (орієнтир категорії health). GMV = замовлення × ~€18.</div>
</div>`);
// 7 · Чому Bolt для АНЦ
slides.push(`${logo()}<div class="slide"><div class="bar"></div><div class="kick">Що ми даємо як компанія</div><h2>Чому Bolt для АНЦ</h2>
  <div class="cards">
   ${[
     ['100% інкрементальний канал','АНЦ = 0 на Bolt Food. Кожне замовлення — поверх Glovo та офлайну. Плюс диверсифікація: не залежите від однієї платформи доставки.'],

// matching the reference "Будинок іграшок" .pptx format (pixel-perfect fidelity to the on-screen design).
async function exportPptxImages(btnId){
  const btn=document.getElementById(btnId||'expBtn');const old=btn.textContent;btn.disabled=true;
  try{
    if(typeof html2canvas==='undefined') throw new Error('html2canvas не завантажено (перевірте інтернет)');
    const stage=document.getElementById('stage');
    const wraps=[].slice.call(document.querySelectorAll('.slidewrap'));
    const prev=i, stageW=stage.clientWidth, stageH=stage.clientHeight, scale=1920/stageW;
    const saved=wraps.map(w=>w.style.display);

    p.author='Bolt Food';p.company='Bolt';p.title='АНЦ × Bolt Food';
    for(let k=0;k<wraps.length;k++){
      btn.textContent='Слайд '+(k+1)+'/'+wraps.length+'…';
      wraps.forEach((w,j)=>{w.style.display=(j===k)?'block':'none';});
      await new Promise(r=>setTimeout(r,90));
      const canvas=await html2canvas(wraps[k],{scale:scale,width:stageW,height:stageH,backgroundColor:'#ffffff',useCORS:true,logging:false});
      const s=p.addSlide();
      s.addImage({data:canvas.toDataURL('image/png'),x:0,y:0,w:10,h:5.625});
    }
    wraps.forEach((w,j)=>{w.style.display=saved[j];});
    set(prev);
    return p.writeFile({fileName:'ANC-Bolt-Food-Proposal.pptx'}).then(()=>{btn.textContent=old;btn.disabled=false;});
  }catch(err){alert('Помилка експорту: '+err.message);btn.textContent=old;btn.disabled=false;return Promise.reject(err);}
}
